<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Suplymate — Connexion</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="assets/auth-pages.css"/>
<link rel="icon" href="assets/favicon.ico" sizes="any"/>
<link rel="icon" type="image/png" sizes="32x32" href="assets/favicon-32.png"/>
<link rel="apple-touch-icon" href="assets/favicon-180.png"/>
<meta name="theme-color" content="#0D3349"/>
<script src="assets/auth.js"></script>
</head>
<body>

<nav>
  <div class="nav-inner">
    <a href="index.html" class="nav-logo">
      <img src="assets/logo-suplymate.png" width="34" height="34" alt=""/>
      Suplymate
    </a>
    <a href="index.html" class="nav-back">← Retour à l'accueil</a>
  </div>
</nav>

<main>
  <div class="auth-card">
    <div class="auth-badge">Phase 1 · Démo</div>
    <h1>Connexion</h1>
    <p class="auth-sub">Accédez à votre tableau de bord acheteur Suplymate.</p>

    <div id="form-error" class="form-error" role="alert"></div>

    <form id="login-form" novalidate>
      <div class="field">
        <label for="email">Adresse e-mail</label>
        <input type="email" id="email" name="email" autocomplete="username" placeholder="demo@suplymate.com" required/>
      </div>
      <div class="field field-tight">
        <label for="password">Mot de passe</label>
        <input type="password" id="password" name="password" autocomplete="current-password" placeholder="••••••••" required/>
        <a id="forgot-link" class="forgot-link" href="forgot-password.html">Mot de passe oublié ?</a>
      </div>
      <button type="submit" class="btn-submit">Se connecter</button>
    </form>

    <p class="demo-hint">
      <strong>Compte démo :</strong><br/>
      E-mail <code>demo@suplymate.com</code> · Mot de passe <code>demo123</code>
    </p>

    <p class="auth-switch">
      Pas encore de compte ?
      <a id="signup-link" href="signup.html">Inscrivez-vous ici</a>
    </p>
  </div>
</main>

<script>
(function () {
  if (SuplymateAuth.isAuthenticated()) {
    window.location.replace(SuplymateAuth.getRedirectTarget());
    return;
  }

  document.getElementById('signup-link').href = SuplymateAuth.authPageUrl('signup.html');
  document.getElementById('forgot-link').href = SuplymateAuth.authPageUrl('forgot-password.html');

  var form = document.getElementById('login-form');
  var errorEl = document.getElementById('form-error');

  form.addEventListener('submit', function (e) {
    e.preventDefault();
    errorEl.classList.remove('visible');
    errorEl.textContent = '';

    var result = SuplymateAuth.login(
      document.getElementById('email').value,
      document.getElementById('password').value
    );

    if (result.ok) {
      window.location.href = SuplymateAuth.getRedirectTarget();
    } else {
      errorEl.textContent = result.message;
      errorEl.classList.add('visible');
    }
  });
})();
</script>
</body>
</html>
