<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Suplymate — Inscription</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="assets/auth-pages.css"/>
<link rel="icon" href="assets/favicon.ico" sizes="any"/>
<link rel="icon" type="image/png" sizes="32x32" href="assets/favicon-32.png"/>
<link rel="apple-touch-icon" href="assets/favicon-180.png"/>
<meta name="theme-color" content="#0D3349"/>
<script src="assets/auth.js"></script>
</head>
<body>

<nav>
  <div class="nav-inner">
    <a href="index.html" class="nav-logo">
      <img src="assets/logo-suplymate.png" width="34" height="34" alt=""/>
      Suplymate
    </a>
    <a href="login.html" class="nav-back">← Déjà un compte ? Connexion</a>
  </div>
</nav>

<main>
  <div class="auth-card">
    <div class="auth-badge">Phase 1 · Démo</div>
    <h1>Créer un compte</h1>
    <p class="auth-sub">Inscrivez-vous pour accéder à votre tableau de bord acheteur.</p>

    <div id="form-error" class="form-error" role="alert"></div>

    <form id="signup-form" novalidate>
      <div class="field">
        <label for="name">Nom complet</label>
        <input type="text" id="name" name="name" autocomplete="name" placeholder="Votre nom" required/>
      </div>
      <div class="field">
        <label for="company">Entreprise <span style="font-weight:400;color:var(--acier)">(optionnel)</span></label>
        <input type="text" id="company" name="company" autocomplete="organization" placeholder="Nom de votre société"/>
      </div>
      <div class="field">
        <label for="email">Adresse e-mail</label>
        <input type="email" id="email" name="email" autocomplete="email" placeholder="vous@entreprise.com" required/>
      </div>
      <div class="field">
        <label for="password">Mot de passe</label>
        <input type="password" id="password" name="password" autocomplete="new-password" placeholder="6 caractères minimum" required/>
      </div>
      <div class="field">
        <label for="confirm-password">Confirmer le mot de passe</label>
        <input type="password" id="confirm-password" name="confirm-password" autocomplete="new-password" placeholder="••••••••" required/>
      </div>
      <button type="submit" class="btn-submit">Créer mon compte</button>
    </form>

    <p class="auth-switch">
      Vous avez déjà un compte ?
      <a id="login-link" href="login.html">Connectez-vous ici</a>
    </p>
  </div>
</main>

<script>
(function () {
  if (SuplymateAuth.isAuthenticated()) {
    window.location.replace(SuplymateAuth.getRedirectTarget());
    return;
  }

  document.getElementById('login-link').href = SuplymateAuth.authPageUrl('login.html');

  var form = document.getElementById('signup-form');
  var errorEl = document.getElementById('form-error');

  form.addEventListener('submit', function (e) {
    e.preventDefault();
    errorEl.classList.remove('visible');
    errorEl.textContent = '';

    var result = SuplymateAuth.signup(
      document.getElementById('name').value,
      document.getElementById('email').value,
      document.getElementById('password').value,
      document.getElementById('confirm-password').value,
      document.getElementById('company').value
    );

    if (result.ok) {
      window.location.href = SuplymateAuth.getRedirectTarget();
    } else {
      errorEl.textContent = result.message;
      errorEl.classList.add('visible');
    }
  });
})();
</script>
</body>
</html>
