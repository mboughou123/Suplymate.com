<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Suplymate — Mot de passe oublié</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="assets/auth-pages.css"/>
<link rel="icon" href="assets/favicon.ico" sizes="any"/>
<link rel="icon" type="image/png" sizes="32x32" href="assets/favicon-32.png"/>
<link rel="apple-touch-icon" href="assets/favicon-180.png"/>
<meta name="theme-color" content="#0D3349"/>
<script src="assets/auth.js"></script>
</head>
<body>

<nav>
  <div class="nav-inner">
    <a href="index.html" class="nav-logo">
      <img src="assets/logo-suplymate.png" width="34" height="34" alt=""/>
      Suplymate
    </a>
    <a id="back-login" href="login.html" class="nav-back">← Retour à la connexion</a>
  </div>
</nav>

<main>
  <div class="auth-card">
    <div class="auth-badge">Phase 1 · Démo</div>
    <h1>Mot de passe oublié ?</h1>
    <p class="auth-sub">Entrez votre adresse e-mail et nous vous enverrons un lien pour réinitialiser votre mot de passe.</p>

    <div id="form-error" class="form-error" role="alert"></div>
    <div id="form-success" class="form-success" role="status"></div>

    <form id="reset-form" novalidate>
      <div class="field">
        <label for="email">Adresse e-mail</label>
        <input type="email" id="email" name="email" autocomplete="email" placeholder="vous@entreprise.com" required/>
      </div>
      <button type="submit" class="btn-submit">Envoyer le lien</button>
    </form>

    <p class="auth-switch">
      <a id="login-link" href="login.html">Retour à la connexion</a>
    </p>
  </div>
</main>

<script>
(function () {
  document.getElementById('back-login').href = SuplymateAuth.authPageUrl('login.html');
  document.getElementById('login-link').href = SuplymateAuth.authPageUrl('login.html');

  var form = document.getElementById('reset-form');
  var errorEl = document.getElementById('form-error');
  var successEl = document.getElementById('form-success');
  var submitBtn = form.querySelector('.btn-submit');

  form.addEventListener('submit', function (e) {
    e.preventDefault();
    errorEl.classList.remove('visible');
    successEl.classList.remove('visible');
    errorEl.textContent = '';
    successEl.textContent = '';

    var result = SuplymateAuth.requestPasswordReset(
      document.getElementById('email').value
    );

    if (result.ok) {
      successEl.textContent = result.message;
      successEl.classList.add('visible');
      submitBtn.textContent = 'E-mail envoyé';
      submitBtn.disabled = true;
    } else {
      errorEl.textContent = result.message;
      errorEl.classList.add('visible');
    }
  });
})();
</script>
</body>
</html>
